<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Eaglercraft</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body {
            width:100%; height:100%;
            overflow:hidden;
            background:#000;
            font-family:sans-serif;
        }
        #gameContainer {
            width:100%; height:100%;
            position:relative;
            background:#000;
        }
        #gameCanvas {
            width:100%; height:100%;
            display:block;
            background:#000;
        }
        #loadingOverlay {
            position:absolute;
            top:0; left:0; width:100%; height:100%;
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            background:#1a1a2e;
            color:#fff;
            z-index:10;
            transition:opacity 0.6s;
        }
        #loadingOverlay.hidden {
            opacity:0;
            pointer-events:none;
        }
        #loadingOverlay h1 {
            font-size:28px;
            margin-bottom:12px;
            text-shadow:0 0 30px #3b82f6;
        }
        #loadingOverlay .spinner {
            width:48px; height:48px;
            border:4px solid #3b82f6;
            border-top-color:transparent;
            border-radius:50%;
            animation:spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform:rotate(360deg); } }
        #loadingOverlay p {
            margin-top:16px;
            color:#aaa;
            font-size:14px;
        }
        #errorMsg {
            color:#ff6b6b;
            margin-top:12px;
            display:none;
        }
        .back-link {
            position:absolute;
            top:16px;
            left:16px;
            z-index:20;
            color:#fff;
            background:rgba(0,0,0,0.6);
            padding:8px 16px;
            border-radius:30px;
            text-decoration:none;
            font-size:14px;
            backdrop-filter:blur(4px);
            border:1px solid rgba(255,255,255,0.2);
            transition:0.2s;
        }
        .back-link:hover {
            background:rgba(59,130,246,0.8);
            border-color:var(--primary-color, #3b82f6);
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <a href="index.html" class="back-link">← Back to Dashboard</a>
        <div id="loadingOverlay">
            <h1>⛏️ Eaglercraft</h1>
            <div class="spinner"></div>
            <p>Loading game assets…</p>
            <div id="errorMsg">⚠️ Failed to load. Please refresh.</div>
        </div>
    </div>
    <script>
        (function(){
            const canvas = document.getElementById('gameCanvas');
            const overlay = document.getElementById('loadingOverlay');
            const errorMsg = document.getElementById('errorMsg');

            function loadEaglercraft() {
                // Try the primary CDN source
                const script = document.createElement('script');
                script.src = 'https://cdn.jsdelivr.net/gh/Spark2222/Eaglercraft-Client@main/client.js';
                script.onload = function() {
                    setTimeout(function() {
                        overlay.classList.add('hidden');
                    }, 600);
                };
                script.onerror = function() {
                    errorMsg.style.display = 'block';
                    overlay.querySelector('p').textContent = '⚠️ Failed to load. Trying fallback…';
                    loadFallback();
                };
                document.body.appendChild(script);
            }

            function loadFallback() {
                const script2 = document.createElement('script');
                script2.src = 'https://cdn.jsdelivr.net/gh/lax1dude/eaglercraft-client@main/client.js';
                script2.onload = function() {
                    setTimeout(function() {
                        overlay.classList.add('hidden');
                    }, 600);
                };
                script2.onerror = function() {
                    errorMsg.style.display = 'block';
                    overlay.querySelector('p').textContent = '⚠️ Could not load Eaglercraft. Please check your connection.';
                };
                document.body.appendChild(script2);
            }

            // Resize handler
            function resize() {
                const w = window.innerWidth;
                const h = window.innerHeight;
                canvas.width = w;
                canvas.height = h;
                canvas.style.width = w + 'px';
                canvas.style.height = h + 'px';
            }
            window.addEventListener('resize', resize);
            resize();

            // Start loading
            loadEaglercraft();

            // Listen for resize messages from the client if any
            window.addEventListener('message', function(e) {
                if (e.data && e.data.type === 'resize') {
                    resize();
                }
            });
        })();
    </script>
</body>
</html>
