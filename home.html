<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title id="tab-title">IXL | Eaglercraft</title>
    <link id="tab-favicon" rel="icon" type="image/x-icon" href="https://www.ixl.com/favicon.ico" />
    <style>
        /* ── Reset & base ── */
        * { box-sizing: border-box; }
        :root {
            --primary-color: #3b82f6;
            --glow-color: rgba(59, 130, 246, 0.95);
            --bg-url: url('https://tse2.mm.bing.net/th/id/OIP.f5HM4GcWYCV8lkGR3MiqjAHaDt?rs=1&pid=ImgDetMain&o=7&rm=3');
            --game-shape: 50%;
        }
        body {
            background-image: var(--bg-url);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #fff;
            font-family: 'Segoe UI', 'Courier New', monospace;
            margin: 0;
            padding: 30px 20px;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }
        body.low-lag {
            background-image: none !important;
            background-color: #050505 !important;
        }
        body.low-lag .circle {
            background-image: none !important;
            background-color: #1a1a1a !important;
            box-shadow: 0 0 10px var(--primary-color) !important;
        }
        body.low-lag .circle::before {
            opacity: 0.2 !important;
            animation: none !important;
        }
        body.low-lag #matrixCanvas {
            display: none !important;
        }
        #matrixCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
            opacity: 0;
            transition: opacity 0.5s;
            mix-blend-mode: screen;
        }
        body.rain-active #matrixCanvas {
            opacity: 0.65;
        }
        .header, .controls, .grid, .soundboard-section {
            position: relative;
            z-index: 10;
        }

        /* ── Header ── */
        .header {
            background: rgba(13, 17, 23, 0.92);
            padding: 15px 40px;
            border-radius: 16px;
            margin-bottom: 30px;
            text-align: center;
            width: 70%;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
            backdrop-filter: blur(6px);
            border: 1px solid var(--primary-color);
            box-shadow: 0 0 35px var(--glow-color);
        }
        .header .subtitle {
            font-size: 14px;
            opacity: 0.7;
            margin-top: 4px;
        }

        /* ── Controls ── */
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 40px;
            background: rgba(0, 0, 0, 0.7);
            padding: 18px 30px;
            border-radius: 50px;
            align-items: center;
            border: 1px solid var(--primary-color);
            justify-content: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 30px var(--glow-color);
        }

        /* ── Grid ── */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 30px 20px;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto 40px auto;
        }
        .game-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeInUp 0.7s ease forwards;
            opacity: 0;
        }
        .circle {
            width: 155px;
            height: 155px;
            border-radius: var(--game-shape);
            background-size: cover;
            background-position: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1);
            margin: 0 auto;
            position: relative;
            z-index: 2;
            box-shadow: 0 0 20px var(--glow-color), 0 0 40px rgba(138, 43, 226, 0.5), inset 0 0 15px rgba(255, 255, 255, 0.3);
            border: 3px solid rgba(255, 255, 255, 0.2);
        }
        .circle::before {
            content: '';
            position: absolute;
            top: -8px;
            left: -8px;
            right: -8px;
            bottom: -8px;
            border-radius: inherit;
            background: transparent;
            border: 2px solid var(--primary-color);
            box-shadow: 0 0 30px var(--primary-color), 0 0 60px #8a2be2, inset 0 0 20px rgba(255, 255, 255, 0.5);
            opacity: 0.7;
            z-index: 1;
            pointer-events: none;
            animation: pulseGlow 3s infinite alternate;
        }
        .circle:hover {
            transform: scale(1.12);
            box-shadow: 0 0 40px var(--glow-color), 0 0 80px #a855f7, inset 0 0 25px #fff;
            border-color: var(--primary-color);
        }
        .circle:hover::before {
            opacity: 1;
            border-width: 4px;
            animation: pulseGlowFast 1.2s infinite alternate;
        }
        @keyframes pulseGlow {
            0% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        @keyframes pulseGlowFast {
            0% { opacity: 0.7; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.02); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .label {
            margin-top: 12px;
            font-weight: 900;
            text-transform: uppercase;
            background: rgba(0, 0, 0, 0.8);
            padding: 8px 18px;
            border-radius: 30px;
            font-size: 10.5px;
            width: fit-content;
            max-width: 145px;
            text-align: center;
            backdrop-filter: blur(4px);
            border: 1px solid var(--primary-color);
            box-shadow: 0 0 15px var(--glow-color);
            display: block;
            word-break: break-word;
        }

        /* ── Buttons ── */
        .btn {
            padding: 10px 22px;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            color: #fff;
            background: var(--primary-color);
            transition: all 0.3s;
            box-shadow: 0 0 12px var(--primary-color);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .btn:hover {
            filter: brightness(1.35);
            transform: translateY(-3px);
            box-shadow: 0 0 25px var(--primary-color);
        }
        .btn-danger {
            background: #dc2626;
            box-shadow: 0 0 12px #ff4444;
        }
        .btn-danger:hover { background: #b91c1c; }
        .rainbow-btn {
            background: linear-gradient(135deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #9400d3);
            background-size: 200% 200%;
            animation: rainbowShift 2s ease infinite;
        }
        @keyframes rainbowShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .rain-toggle.active {
            background: #00cc99;
            box-shadow: 0 0 25px #00ffc3;
        }

        /* ── Soundboard ── */
        .soundboard-section {
            max-width: 1400px;
            margin: 0 auto 40px auto;
            background: rgba(10, 15, 25, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 24px 28px;
            border: 1px solid var(--primary-color);
            box-shadow: 0 0 25px var(--glow-color);
        }
        .soundboard-header {
            font-size: 28px;
            font-weight: bold;
            border-left: 6px solid var(--primary-color);
            padding-left: 20px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .soundboard-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: space-around;
        }
        .sound-item {
            background: rgba(0, 0, 0, 0.65);
            border-radius: 28px;
            padding: 20px;
            flex: 1;
            min-width: 260px;
            border: 1px solid rgba(59, 130, 246, 0.6);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
            transition: transform 0.2s;
        }
        .sound-item:hover {
            transform: translateY(-5px);
            border-color: var(--primary-color);
        }
        .sound-name {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 12px;
            text-align: center;
            background: linear-gradient(135deg, #fff, #a0c0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .control-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin: 15px 0 12px;
        }
        .sound-btn {
            background: #2d3e5f;
            border: none;
            padding: 8px 18px;
            border-radius: 40px;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 0 5px var(--primary-color);
        }
        .sound-btn:hover {
            background: var(--primary-color);
            transform: scale(1.03);
        }
        .loop-label {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #1e2a3a;
            padding: 5px 12px;
            border-radius: 40px;
        }
        .speed-slider {
            width: 140px;
            cursor: pointer;
            accent-color: var(--primary-color);
        }
        .speed-value {
            background: #000000aa;
            border-radius: 20px;
            padding: 4px 10px;
            font-size: 0.8rem;
            font-family: monospace;
        }
        .mute-note {
            font-size: 12px;
            background: #000000aa;
            padding: 4px 12px;
            border-radius: 20px;
            margin-left: 15px;
        }

        /* ── Custom BG area ── */
        .custom-bg-area {
            background: rgba(0, 0, 0, 0.7);
            padding: 5px 12px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
        }
        .drag-area {
            border: 1px dashed #aaa;
            border-radius: 30px;
            padding: 5px 12px;
            background: #1a1a1a;
            font-size: 11px;
            cursor: pointer;
            transition: 0.2s;
        }
        .drag-area:hover {
            background: #2a2a2a;
            border-color: var(--primary-color);
        }
        select {
            background: #1a1a2e;
            color: #fff;
            border: 1px solid var(--primary-color);
            border-radius: 30px;
            padding: 8px 16px;
            font-weight: bold;
        }
        #bgUrlInput {
            background: #1a1a2e;
            color: #fff;
            border: 1px solid var(--primary-color);
            border-radius: 30px;
            padding: 6px 14px;
            width: 150px;
        }
        #bgUrlInput::placeholder { color: #888; }

        /* ── Responsive ── */
        @media (max-width: 700px) {
            .header { width: 95%; padding: 12px 16px; }
            .controls { flex-direction: column; border-radius: 28px; padding: 16px; }
            .grid { grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 20px 12px; }
            .circle { width: 120px; height: 120px; }
            .label { font-size: 9px; max-width: 110px; padding: 6px 12px; }
            .soundboard-header { font-size: 20px; }
            #bgUrlInput { width: 100px; }
        }
        @media (max-width: 480px) {
            .circle { width: 100px; height: 100px; }
            .grid { grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 16px 10px; }
            .label { font-size: 8px; max-width: 90px; padding: 4px 8px; }
            .controls .btn { padding: 6px 14px; font-size: 11px; }
            .header h1 { font-size: 18px; }
        }
    </style>
</head>

    <script>
        (function() {
            'use strict';

            // ── Cloak data ──
            const EDU_CLOAKS = [
                { title: 'IXL | Eaglercraft', fav: 'https://www.ixl.com/favicon.ico', head: '✨ IXL · Eaglercraft ✨' },
                { title: 'Typing Agent', fav: 'https://app.typingagent.com/favicon.ico', head: 'Typing Agent Student Portal' },
                { title: 'i-Ready Login', fav: 'https://login.i-ready.com/favicon.ico', head: 'i-Ready Student Dashboard' },
                { title: 'Infinite Campus', fav: 'https://www.google.com/s2/favicons?domain=infinitecampus.com&sz=64', head: 'Infinite Campus - Student' },
                { title: 'Google Classroom', fav: 'https://www.google.com/s2/favicons?domain=classroom.google.com&sz=64', head: 'Google Classroom' },
                { title: 'Clever | Portal', fav: 'https://www.google.com/s2/favicons?domain=clever.com&sz=64', head: 'Clever' },
                { title: 'Schoology', fav: 'https://www.google.com/s2/favicons?domain=schoology.com&sz=64', head: 'Schoology' },
                { title: 'Canvas', fav: 'https://www.google.com/s2/favicons?domain=instructure.com&sz=64', head: 'Canvas Dashboard' },
                { title: 'Khan Academy', fav: 'https://www.khanacademy.org/favicon.ico', head: 'Khan Academy' }
            ];
            let currentCloakIndex = 0;

            // ── State ──
            let isSquareShape = false;
            let rainActive = false;
            let rainAnimFrame = null;
            let rainbowMode = false;
            let rainbowInterval = null;
            let sigmaMode = false;

            const EAGLERCRAFT_LOGO = 'https://tse2.mm.bing.net/th/id/OIP.KBpJ8T918BeX7xSu6NpwxQAAAA?rs=1&pid=ImgDetMain&o=7&rm=3';
            const EAGLERCRAFT_DESC = 'Play Minecraft in your browser! Eaglercraft is a fully-featured Minecraft clone that runs on WebGL. No download required — just click and play!';

            // ── Render game card (links to game.html) ──
            function renderGame() {
                const grid = document.getElementById('gameGrid');
                grid.innerHTML = `
                    <div class="game-card">
                        <a href="game.html" target="_self" style="text-decoration:none; display:contents;">
                            <div class="circle" style="background-image:url('${EAGLERCRAFT_LOGO}');"></div>
                        </a>
                        <div class="label">Eaglercraft</div>
                    </div>
                `;
                document.getElementById('gameCounter').textContent = '🎮 1 game available';
            }

            // ── Toggle cloak ──
            window.toggleCloak = function() {
                currentCloakIndex = (currentCloakIndex + 1) % EDU_CLOAKS.length;
                const c = EDU_CLOAKS[currentCloakIndex];
                document.getElementById('tab-title').innerText = c.title;
                document.getElementById('tab-favicon').href = c.fav;
                document.getElementById('main-title').innerText = c.head;
            };

            // ── Lag killer ──
            window.toggleLagKiller = function() {
                document.getElementById('mainBody').classList.toggle('low-lag');
                if (rainActive && document.body.classList.contains('low-lag')) {
                    if (rainAnimFrame) cancelAnimationFrame(rainAnimFrame);
                } else if (rainActive && !document.body.classList.contains('low-lag')) {
                    drawRain();
                }
            };

            // ── Delete all saved data ──
            window.deleteAllSavedData = function() {
                if (confirm('Delete ALL saved data?')) {
                    localStorage.clear();
                    location.reload();
                }
            };
            document.getElementById('deleteDataBtn').addEventListener('click', window.deleteAllSavedData);

            // ── Sigma mode ──
            window.toggleSigmaMode = function() {
                sigmaMode = !sigmaMode;
                const titleEl = document.getElementById('main-title');
                const btn = document.getElementById('sigmaToggleBtn');
                if (sigmaMode) {
                    titleEl.textContent = '🔥 SIGMATOWN4LIFE 🔥';
                    btn.textContent = '🔥 SIGMATOWN4LIFE ON';
                    btn.style.background = '#ff4500';
                } else {
                    const c = EDU_CLOAKS[currentCloakIndex] || EDU_CLOAKS[0];
                    titleEl.textContent = c.head;
                    btn.textContent = '🔥 SIGMATOWN4LIFE';
                    btn.style.background = '#ff6b00';
                }
            };
            document.getElementById('sigmaToggleBtn').addEventListener('click', window.toggleSigmaMode);

            // ── Shape toggle ──
            document.getElementById('shapeToggleBtn').addEventListener('click', function() {
                isSquareShape = !isSquareShape;
                document.documentElement.style.setProperty('--game-shape', isSquareShape ? '20px' : '50%');
                this.innerText = isSquareShape ? '⬛ SQUARE MODE' : '🔘 CIRCLE MODE';
            });

            // ── Rainbow mode ──
            window.toggleRainbowMode = function() {
                rainbowMode = !rainbowMode;
                if (rainbowMode) {
                    let hue = Math.random() * 360;
                    rainbowInterval = setInterval(() => {
                        hue = (hue + 7) % 360;
                        document.documentElement.style.setProperty('--primary-color', 'hsl(' + hue + ',100%,52%)');
                        document.documentElement.style.setProperty('--glow-color', 'hsla(' + hue + ',100%,52%,0.95)');
                    }, 35);
                } else {
                    if (rainbowInterval) clearInterval(rainbowInterval);
                    rainbowInterval = null;
                    const pk = document.getElementById('primaryColorPicker');
                    let val = pk && pk.value ? pk.value : '#3b82f6';
                    document.documentElement.style.setProperty('--primary-color', val);
                    const r = parseInt(val.slice(1, 3), 16) || 59,
                        g = parseInt(val.slice(3, 5), 16) || 130,
                        b = parseInt(val.slice(5, 7), 16) || 246;
                    document.documentElement.style.setProperty('--glow-color', 'rgba(' + r + ',' + g + ',' + b + ',0.95)');
                }
            };
            document.getElementById('rainbowColorBtn').addEventListener('click', window.toggleRainbowMode);

            // ── Color picker ──
            document.getElementById('primaryColorPicker').addEventListener('input', function(e) {
                if (rainbowMode) window.toggleRainbowMode();
                const val = e.target.value;
                document.documentElement.style.setProperty('--primary-color', val);
                const r = parseInt(val.slice(1, 3), 16),
                    g = parseInt(val.slice(3, 5), 16),
                    b = parseInt(val.slice(5, 7), 16);
                document.documentElement.style.setProperty('--glow-color', 'rgba(' + r + ',' + g + ',' + b + ',0.95)');
            });

            // ── Wallpaper ──
            document.getElementById('wallpaperSelect').addEventListener('change', function(e) {
                document.documentElement.style.setProperty('--bg-url', 'url(\'' + e.target.value + '\')');
            });

            // ── Apply BG ──
            document.getElementById('applyBgBtn').addEventListener('click', function() {
                const url = document.getElementById('bgUrlInput').value.trim();
                if (url) document.documentElement.style.setProperty('--bg-url', 'url(\'' + url + '\')');
            });

            // ── Drag & drop ──
            const dragZone = document.getElementById('dragDropZone');
            dragZone.addEventListener('dragover', function(e) {
                e.preventDefault();
                this.style.borderColor = 'var(--primary-color)';
            });
            dragZone.addEventListener('dragleave', function() {
                this.style.borderColor = '#aaa';
            });
            dragZone.addEventListener('drop', function(e) {
                e.preventDefault();
                const file = e.dataTransfer.files[0];
                if (file && file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = function(ev) {
                        document.documentElement.style.setProperty('--bg-url', 'url(\'' + ev.target.result + '\')');
                    };
                    reader.readAsDataURL(file);
                }
                this.style.borderColor = '#aaa';
            });
            dragZone.addEventListener('click', function() {
                const url = prompt('Paste image URL:');
                if (url) document.documentElement.style.setProperty('--bg-url', 'url(\'' + url + '\')');
            });

            // ── Local file ──
            window.handleLocalFile = function(input) {
                const file = input.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.documentElement.style.setProperty('--bg-url', 'url(\'' + e.target.result + '\')');
                };
                reader.readAsDataURL(file);
            };

            // ── Rain ──
            const matrixCanvas = document.getElementById('matrixCanvas');
            const mctx = matrixCanvas.getContext('2d');
            let mw, mh, drops = [];
            const matrixChars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&".split("");

            function initRain() {
                mw = window.innerWidth;
                mh = window.innerHeight;
                matrixCanvas.width = mw;
                matrixCanvas.height = mh;
                const colCount = Math.floor(mw / 20);
                drops = Array(colCount).fill(0).map(() => Math.floor(Math.random() * -mh / 20));
            }

            function drawRain() {
                if (!rainActive) return;
                const primaryColor = getComputedStyle(document.documentElement).getPropertyValue('--primary-color').trim();
                let rc1, rc2;
                if (primaryColor.startsWith('#')) {
                    const r = parseInt(primaryColor.slice(1, 3), 16),
                        g = parseInt(primaryColor.slice(3, 5), 16),
                        b = parseInt(primaryColor.slice(5, 7), 16);
                    rc1 = 'rgba(' + r + ',' + g + ',' + b + ',0.9)';
                    rc2 = 'rgba(' + Math.min(r + 50, 255) + ',' + Math.min(g + 50, 255) + ',255,0.9)';
                } else {
                    rc1 = '#a0f0ff';
                    rc2 = '#20ff80';
                }
                mctx.fillStyle = 'rgba(0,0,0,0.05)';
                mctx.fillRect(0, 0, mw, mh);
                mctx.font = "20px 'Courier New', monospace";
                mctx.shadowColor = primaryColor;
                mctx.shadowBlur = 12;
                for (let i = 0; i < drops.length; i++) {
                    mctx.fillStyle = i % 2 ? rc1 : rc2;
                    mctx.fillText(matrixChars[Math.floor(Math.random() * matrixChars.length)], i * 20, drops[i] * 20);
                    if (drops[i] * 20 > mh && Math.random() > 0.975) drops[i] = 0;
                    drops[i]++;
                }
                mctx.shadowBlur = 0;
                rainAnimFrame = requestAnimationFrame(drawRain);
            }

            window.toggleRain = function() {
                rainActive = !rainActive;
                document.body.classList.toggle('rain-active', rainActive);
                const btn = document.getElementById('rainToggleBtn');
                if (btn) btn.classList.toggle('active', rainActive);
                if (rainActive) { initRain(); drawRain(); } else { if (rainAnimFrame) cancelAnimationFrame(rainAnimFrame); mctx.clearRect(0, 0, mw, mh); }
            };
            document.getElementById('rainToggleBtn').addEventListener('click', window.toggleRain);

            // ── Music ──
            const MUSIC_TRACKS = {
                doors: 'https://www.myinstants.com/media/sounds/doors-elevator-music.mp3',
                mk: 'https://www.myinstants.com/media/sounds/mortal-kombat-snes-music-title-player-select.mp3',
                wii: 'https://www.myinstants.com/media/sounds/wii-sports-soundtrack.mp3'
            };
            let menuMusic = null, musicPlaying = true, currentTrack = 'doors';

            function initMenuMusic() {
                menuMusic = new Audio(MUSIC_TRACKS.doors);
                menuMusic.loop = true;
                menuMusic.volume = 0.45;
                menuMusic.play().catch(function() {});

                document.getElementById('musicToggleBtn').addEventListener('click', function() {
                    musicPlaying = !musicPlaying;
                    if (musicPlaying) {
                        if (menuMusic.paused) menuMusic.play().catch(function() {});
                        this.textContent = '🎵 MENU MUSIC ON';
                        this.style.background = '#a855f7';
                    } else {
                        menuMusic.pause();
                        this.textContent = '🎵 MENU MUSIC OFF';
                        this.style.background = '#6b7280';
                    }
                });

                document.getElementById('musicSpeedSlider').addEventListener('input', function() {
                    const s = parseFloat(this.value);
                    if (menuMusic) menuMusic.playbackRate = s;
                    document.getElementById('musicSpeedValue').textContent = s.toFixed(1) + 'x';
                });

                document.getElementById('musicTrackSelect').addEventListener('change', function() {
                    const trackKey = this.value;
                    if (trackKey === currentTrack && menuMusic && !menuMusic.paused) return;
                    currentTrack = trackKey;
                    const wasPlaying = musicPlaying && menuMusic && !menuMusic.paused;
                    if (menuMusic) {
                        menuMusic.pause();
                        menuMusic.src = MUSIC_TRACKS[trackKey];
                        menuMusic.load();
                        if (wasPlaying || musicPlaying) menuMusic.play().catch(function() {});
                    } else {
                        menuMusic = new Audio(MUSIC_TRACKS[trackKey]);
                        menuMusic.loop = true;
                        menuMusic.volume = 0.45;
                        if (musicPlaying) menuMusic.play().catch(function() {});
                    }
                });
            }

            // ── Soundboard ──
            const soundTracks = [
                { id: 'typing', name: '⌨️ Fast Typing (Keyboard)', url: 'https://gfxsounds.com/wp-content/uploads/2023/03/Laptop-keyboard-typing-fast.mp3' },
                { id: 'pencil', name: '✏️ Pencil Writing', url: 'https://bigsoundbank.com/UPLOAD/mp3/0221.mp3' }
            ];
            let soundboardAudios = {};

            function buildSoundboard() {
                const container = document.getElementById('soundboardContainer');
                if (!container) return;
                container.innerHTML = '';
                soundTracks.forEach(function(track) {
                    const audio = new Audio(track.url);
                    audio.preload = 'auto';
                    audio.loop = false;
                    soundboardAudios[track.id] = audio;
                    const div = document.createElement('div');
                    div.className = 'sound-item';
                    div.innerHTML =
                        '<div class="sound-name">' + track.name +
                        '</div><div class="control-group"><button class="sound-btn play-btn" data-id="' + track.id + '">▶ PLAY</button><button class="sound-btn stop-btn" data-id="' + track.id + '">⏹ STOP</button><label class="loop-label">🔄 LOOP <input type="checkbox" class="loop-check" data-id="' + track.id + '"></label></div><div class="control-group"><span>🐢 SPEED 0.5x ── </span><input type="range" class="speed-slider" data-id="' + track.id + '" min="0.5" max="2.0" step="0.01" value="1.0"><span class="speed-value" id="speedVal-' + track.id + '">1.00x</span><span> ── 2.0x 🐇</span></div>';
                    container.appendChild(div);
                });

                document.querySelectorAll('.play-btn').forEach(function(btn) {
                    btn.addEventListener('click', function() {
                        const id = this.getAttribute('data-id');
                        const aud = soundboardAudios[id];
                        if (aud) {
                            if (aud.ended) aud.currentTime = 0;
                            aud.play().catch(function() {});
                        }
                    });
                });
                document.querySelectorAll('.stop-btn').forEach(function(btn) {
                    btn.addEventListener('click', function() {
                        const id = this.getAttribute('data-id');
                        const aud = soundboardAudios[id];
                        if (aud) { aud.pause(); aud.currentTime = 0; }
                    });
                });
                document.querySelectorAll('.loop-check').forEach(function(chk) {
                    chk.addEventListener('change', function() {
                        const id = this.getAttribute('data-id');
                        if (soundboardAudios[id]) soundboardAudios[id].loop = this.checked;
                    });
                });
                document.querySelectorAll('.speed-slider').forEach(function(slider) {
                    function update() {
                        const id = slider.getAttribute('data-id');
                        const val = parseFloat(slider.value);
                        if (soundboardAudios[id]) soundboardAudios[id].playbackRate = val;
                        const sp = document.getElementById('speedVal-' + id);
                        if (sp) sp.innerText = val.toFixed(2) + 'x';
                    }
                    slider.addEventListener('input', update);
                    update();
                });
            }

            // ── Keyboard shortcut: 6 → IXL ──
            document.addEventListener('keydown', function(e) {
                if (e.key !== '6' && e.code !== 'Numpad6') return;
                const el = e.target;
                if (el && (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA' || el.isContentEditable)) return;
                e.preventDefault();
                window.open('https://www.ixl.com', '_blank', 'noopener,noreferrer');
            });

            // ── Init ──
            window.addEventListener('load', function() {
                renderGame();
                initMenuMusic();
                buildSoundboard();
            });

        })();
    </script>
</body>
</html>
